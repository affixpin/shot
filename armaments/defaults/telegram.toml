name = "telegram"
healthcheck = 'which curl && which jq && test -n "$bot_token"'
command = 'OFFSET=$(cat /tmp/shot_tg_offset 2>/dev/null || echo 0) && result=$(curl -s "https://api.telegram.org/bot$bot_token/getUpdates?offset=$OFFSET&timeout=30") && echo "$result" | jq -c ".result[]" | while read -r u; do echo $(($(echo "$u" | jq ".update_id") + 1)) > /tmp/shot_tg_offset; echo "$u" | jq -c ".message"; done'
interval = 1

[vars.bot_token]
description = "Telegram bot token"
required = true
