healthcheck = "test -n \"$TG_BOT_TOKEN\""
name = "tg_poll"
description = "Poll Telegram for new messages. Returns messages in format: [chat_id] text"
command = 'OFFSET=$(cat /tmp/shot_tg_offset 2>/dev/null || echo 0) && result=$(curl -s "https://api.telegram.org/bot$TG_BOT_TOKEN/getUpdates?offset=$OFFSET&timeout=5") && echo "$result" | jq -c ".result[]" | while read -r update; do echo $(($(echo "$update" | jq ".update_id") + 1)) > /tmp/shot_tg_offset; chat_id=$(echo "$update" | jq ".message.chat.id"); text=$(echo "$update" | jq -r ".message.text // empty"); [ -n "$text" ] && echo "[$chat_id] $text"; done'

[env]
TG_BOT_TOKEN = ""
