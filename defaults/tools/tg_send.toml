healthcheck = "test -n \"$TG_BOT_TOKEN\""
name = "tg_send"
description = "Send a message to a Telegram chat"
command = 'curl -s "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" -d "chat_id=$chat_id" --data-urlencode "text=$message" | jq -r "if .ok then \"Sent to \" + (.result.chat.id | tostring) else \"Error: \" + .description end"'

[env]
TG_BOT_TOKEN = ""

[params.chat_id]
type = "string"
description = "Telegram chat ID to send message to"
required = true

[params.message]
type = "string"
description = "Message text to send"
required = true
