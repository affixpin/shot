healthcheck = "which curl && test -n \"$bot_token\""
name = "tg_send"
description = "Send a message to a Telegram chat"
command = '''r=$(curl -s "https://api.telegram.org/bot$bot_token/sendMessage" -d "chat_id=$chat_id" --data-urlencode "text=$message") && (printf %s "$r" | grep -q '"ok":true' && echo "Sent to $chat_id" || echo "Error: $r")'''

[vars.bot_token]
description = "Telegram bot token"
required = true
hide = true

[vars.chat_id]
type = "string"
description = "Telegram chat ID to send message to"
required = true

[vars.message]
type = "string"
description = "Message text to send"
required = true
