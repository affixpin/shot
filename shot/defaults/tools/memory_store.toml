healthcheck = "which engram"
name = "memory_store"
description = "Remember a fact for later. Use this to save decisions, discoveries, patterns, or anything worth recalling in future sessions."
command = 'engram save "$title" "$content"'

[vars.title]
type = "string"
description = "Short searchable title (e.g. 'auth decision', 'db schema change')"
required = true

[vars.content]
type = "string"
description = "Detailed content to remember"
required = true
