healthcheck = "test -n \"$jina_api_key\""
name = "web_search"
description = "Search the web and return results as markdown"
command = 'curl -sS "https://s.jina.ai/$(printf "%s" "$query" | jq -sRr @uri)" -H "Accept: text/markdown" -H "Authorization: Bearer $jina_api_key" -H "X-No-Cache: true"'

[vars.jina_api_key]
description = "Jina API key (https://jina.ai/reader)"
required = true
hide = true

[vars.query]
type = "string"
description = "Search query"
required = true
